# Opt-in "statement" variant of ARC-Challenge. Same data and same
# question/target as `arc_challenge`, but each answer option is rewritten into a
# full declarative sentence by `arc_templater.process_docs` (deterministic by
# default; ollama opt-in) and THOSE sentences are what the model ranks. This is a
# DISTINCT, clearly-labelled task -- never a drop-in for standard arc_challenge.
# Report a number from it as "ARC-C (statement-rewritten by <backend/model>)".
#
# Requires files/ on sys.path (for `!function arc_templater...`) and this dir on
# lm-eval's include_path; run_lm_eval.py arranges both. Config for the rewrite is
# read from the environment by arc_templater (ARC_TEMPLATER_BACKEND/MODEL/...).
task: arc_challenge_statement
dataset_path: allenai/ai2_arc
dataset_name: ARC-Challenge
output_type: multiple_choice
training_split: train
validation_split: validation
test_split: test
process_docs: !function arc_templater.process_docs
doc_to_text: "Question: {{question}}\nAnswer:"
doc_to_target: "{{choices.label.index(answerKey)}}"
doc_to_choice: "{{statement_choices}}"
should_decontaminate: true
doc_to_decontamination_query: "Question: {{question}}\nAnswer:"
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm
    aggregation: mean
    higher_is_better: true
metadata:
  version: 0.0
